name: Release Binary

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: srt-translator-cli-linux
          - os: windows-latest
            artifact_name: srt-translator-cli-win.exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Set up Virtual Environment
      shell: bash
      run: |
        python -m venv .venv
        # Cross-platform way to activate or just use the full path
        if [ "$RUNNER_OS" == "Windows" ]; then
          .venv/Scripts/python -m pip install --upgrade pip
        else
          .venv/bin/python -m pip install --upgrade pip
        fi

    - name: Install Dependencies
      shell: bash
      run: |
        make setup

    - name: Build binary
      shell: bash
      run: |
        # Use make build but override the name for consistency
        export PYTHONPATH=.
        if [ "$RUNNER_OS" == "Windows" ]; then
          .venv/Scripts/pyinstaller --onefile --name ${{ matrix.artifact_name }} srt_translator/cli.py
        else
          make build
          mv dist/srt-translator-cli dist/${{ matrix.artifact_name }}
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/${{ matrix.artifact_name }}

  github_release:
    name: Create GitHub Release
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate Changelog
        run: |
          git log --oneline --pretty=format:"* %s (%h)" | head -n 20 > dist/changelog.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag_name=${GITHUB_REF#refs/tags/}
          gh release create "$tag_name" dist/* --title "Release $tag_name" --notes-file dist/changelog.txt
